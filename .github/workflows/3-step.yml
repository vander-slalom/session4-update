name: Step 3

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: write
  issues: write

env:
  STEP_4_FILE: ".github/steps/4-step.md"

jobs:
  find_exercise:
    name: Find Exercise Issue
    uses: skills/exercise-toolkit/.github/workflows/find-exercise-issue.yml@v0.6.0

  check_step_work:
    name: Check step work
    runs-on: ubuntu-latest
    needs: find_exercise
    if: |
      !github.event.repository.is_template
    env:
      ISSUE_URL: ${{ needs.find_exercise.outputs.issue-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get response templates
        uses: actions/checkout@v4
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.6.0

      - name: Update comment - checking work
        run: |
          gh issue comment "$ISSUE_URL" \
            --body-file exercise-toolkit/markdown-templates/step-feedback/checking-work.md \
            --edit-last
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v46.0.3

      - name: Build message - step mistake
        id: build-message-step-mistake
        uses: skills/action-text-variables@v1
        with:
          template-file: exercise-toolkit/markdown-templates/step-feedback/step-mistake.md
          template-vars: |
            feedback_message="Please use Copilot to implement an issue that affects files in the `src` folder, or add tests in the `tests` folder."

      - name: Check for changes in src or tests folder
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_BODY: ${{ steps.build-message-step-mistake.outputs.updated-text }}
        run: |
          # Show the list of all changed files
          echo "All changed files: ${ALL_CHANGED_FILES}"

          # Initialize flag
          has_valid_changes=false

          # Check each changed file
          for file in ${ALL_CHANGED_FILES}; do
            if [[ $file == src/* || $file == tests/* || $file == .github/workflows/* ]]; then
              has_valid_changes=true
              break
            fi
          done

          # If no valid changes found, comment and exit
          if ! $has_valid_changes; then
            gh issue comment "$ISSUE_URL" \
              --body "$COMMENT_BODY" \
              --edit-last
            exit 1
          fi

      - name: QE Validation - Check for test modifications
        id: check-tests
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          has_test_changes=false
          for file in ${ALL_CHANGED_FILES}; do
            if [[ $file == tests/* || $file == .github/workflows/* ]]; then
              has_test_changes=true
              break
            fi
          done
          echo "has_test_changes=$has_test_changes" >> $GITHUB_OUTPUT

      - name: QE Validation - Run Pytest
        if: steps.check-tests.outputs.has_test_changes == 'true'
        continue-on-error: true # Allow failure so it doesn't block the workshop flow
        run: |
          pip install pytest httpx
          pip install -r requirements.txt
          pytest tests/ > test_results.txt 2>&1 || true
          cat test_results.txt

      - name: QE Validation - Post Results
        if: steps.check-tests.outputs.has_test_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TEST_OUTPUT=$(cat test_results.txt | head -n 20)
          gh issue comment "$ISSUE_URL" \
            --body "### 🧪 QE Activity Detected!
            
            **I've reviewed your Quality Engineering work.**
            
            Because you modified files in \`tests/\` or \`.github/workflows/\`, I automatically ran the project's test suite to validate your changes.
            
            Here is a snapshot of the execution results:
            
            \`\`\`
            $TEST_OUTPUT
            ... (output truncated)
            \`\`\`
            
            *Note: Whether tests passed or failed, your workshop progress continues! Great job exploring the QE path.*"

      - name: Build message - step finished
        id: build-message-step-finish
        uses: skills/action-text-variables@v1
        with:
          template-file: exercise-toolkit/markdown-templates/step-feedback/step-finished-prepare-next-step.md
          template-vars: |
            next_step_number=4

      - name: Update comment - step finished
        run: |
          gh issue comment "$ISSUE_URL" \
            --body "${{ steps.build-message-step-finish.outputs.updated-text }}" \
            --edit-last
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  post_next_step_content:
    name: Post next step content
    needs: [find_exercise, check_step_work]
    runs-on: ubuntu-latest
    env:
      ISSUE_URL: ${{ needs.find_exercise.outputs.issue-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get response templates
        uses: actions/checkout@v4
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.6.0

      - name: Build comment - add step content
        id: build-comment
        uses: skills/action-text-variables@v1
        with:
          template-file: ${{ env.STEP_4_FILE }}
          template-vars: |
            pull_request_url=${{ github.event.pull_request.html_url }}

      - name: Create comment - add step content
        run: |
          gh issue comment "$ISSUE_URL" \
            --body "$ISSUE_BODY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_BODY: ${{ steps.build-comment.outputs.updated-text }}

      - name: Create comment - watching for progress
        run: |
          gh issue comment "$ISSUE_URL" \
            --body-file exercise-toolkit/markdown-templates/step-feedback/watching-for-progress.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Disable current workflow and enable next one
        run: |
          gh workflow disable "Step 3"
          gh workflow enable "Step 4"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
